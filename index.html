<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>Baroflix</title>
    <!-- GitHub Pages SPA: restore path encoded by 404.html -->
    <script>
      (function () {
        var qs = window.location.search;
        var p = new URLSearchParams(qs).get('p');
        if (p) {
          var h = new URLSearchParams(qs).get('h') || '';
          window.history.replaceState(null, '', decodeURIComponent(p) + decodeURIComponent(h));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
